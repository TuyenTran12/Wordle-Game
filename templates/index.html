<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle AI Solver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2e2e2e;
      --text: #d4d4d4;
      --text-dim: #666;
      --green: #00c853;
      --yellow: #b59f00;
      --gray: #3a3a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--green);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gray);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.error { background: #ff4444; }

    .container {
      display: flex;
      gap: 32px;
      width: 100%;
      max-width: 900px;
      align-items: flex-start;
    }

    .board-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .board {
      display: grid;
      grid-template-rows: repeat(6, 62px);
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 62px);
      gap: 6px;
    }

    .cell {
      width: 62px;
      height: 62px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--surface);
      transition: border-color 0.1s;
      user-select: none;
    }

    .cell.reveal-w { background: var(--gray); border-color: var(--gray); color: #fff; }
    .cell.reveal-y { background: var(--yellow); border-color: var(--yellow); color: #000; }
    .cell.reveal-g { background: var(--green); border-color: var(--green); color: #000; }
    .cell.flip { animation: flip 0.5s ease forwards; }
    .cell.pop { animation: pop 0.1s ease; }

    @keyframes flip {
      0%   { transform: rotateX(0deg); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 260px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .card-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 200, 83, 0.08);
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: var(--green);
      color: #000;
    }
    .btn-start:hover { background: #00e05f; }
    .btn-start:disabled { background: var(--gray); color: var(--text-dim); cursor: not-allowed; }

    .btn-stop {
      background: transparent;
      border: 1px solid #ff4444;
      color: #ff4444;
    }
    .btn-stop:hover { background: rgba(255, 68, 68, 0.1); }

    .btn-new {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-new:hover { border-color: var(--text); color: var(--text); }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .speed-row label {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .speed-row input[type=range] {
      flex: 1;
      accent-color: var(--green);
      height: 4px;
    }

    .speed-val {
      font-size: 0.7rem;
      color: var(--green);
      min-width: 45px;
      text-align: right;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .guess-counter {
      font-size: 0.75rem;
      color: var(--text-dim);
      min-width: 36px;
      text-align: right;
    }

    .log-card {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .log-list {
      flex: 1;
      max-height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 6px;
      border-left: 3px solid var(--border);
    }

    .log-entry.win  { border-left-color: var(--green); }
    .log-entry.lose { border-left-color: #ff4444; }
    .log-entry.info { border-left-color: var(--yellow); }

    .log-guess {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .log-result {
      display: flex;
      gap: 4px;
    }

    .log-badge {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .log-badge.w { background: var(--gray); color: #fff; }
    .log-badge.y { background: var(--yellow); color: #000; }
    .log-badge.g { background: var(--green); color: #000; }

    .log-meta {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .log-empty {
      color: var(--text-dim);
      font-size: 0.75rem;
      text-align: center;
      padding: 24px 0;
    }

    .message {
      text-align: center;
      padding: 8px 0;
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .message.win  { color: var(--green); font-weight: 700; }
    .message.lose { color: #ff4444; font-weight: 700; }

    @media (max-width: 680px) {
      .container { flex-direction: column; align-items: center; }
      .panel { width: 100%; min-width: unset; }
    }

    .seed-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .seed-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
    }

    .seed-row input:focus { border-color: var(--green); }
    .seed-row label {
      font-size: 0.7rem;
      color: var(--text-dim);
      align-self: center;
      white-space: nowrap;
    }

    .word-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .word-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
      text-transform: uppercase;
    }

    .word-row input:focus { border-color: var(--green); }
    .word-row label {
      font-size: 0.7rem;
      color: var(--text-dim);
      align-self: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <h1>Wordle Solver</h1>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="container">
  <div class="board-section">
    <div class="board" id="board"></div>
    <div class="message" id="gameMessage">Press Start to play</div>
  </div>

  <div class="panel">
    <div class="card">
      <div class="card-title">Controls</div>
      <div class="controls">
        <div class="mode-row">
          <button class="mode-btn active" id="modeDaily" onclick="setMode('daily')">Daily</button>
          <button class="mode-btn" id="modeRandom" onclick="setMode('random')">Random</button>
          <button class="mode-btn" id="modeSpecific" onclick="setMode('specific')">Specific</button>
        </div>

        <div class="seed-row" id="seedRow" style="display:none;">
          <label>Seed:</label>
          <input type="number" id="seedInput" placeholder="(optional)" />
        </div>

        <div class="seed-row" id="wordRow" style="display:none;">
          <label>Word:</label>
          <input type="text" id="wordInput" placeholder="Enter a word" maxlength="8" />
        </div>

        <button class="action-btn btn-start" id="startBtn" onclick="startGame()">Start Game</button>
        <button class="action-btn btn-stop" id="stopBtn" onclick="stopGame()" style="display:none;">Stop</button>
        <button class="action-btn btn-new" id="resetBtn" onclick="resetGame()">New Game</button>

        <div class="speed-row">
          <label>Speed:</label>
          <input type="range" id="speedSlider" min="200" max="2000" value="800" step="100" oninput="updateSpeedLabel()" />
          <span class="speed-val" id="speedVal">800ms</span>
        </div>

        <div class="progress-row">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <span class="guess-counter" id="guessCounter">0/6</span>
        </div>
      </div>
    </div>

    <div class="card log-card">
      <div class="card-title">Game Log</div>
      <div class="log-list" id="logList">
        <div class="log-empty">No guesses yet</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config (var so document.write on reload doesn't error) ─────────────────────
var WORD_SIZE = 5;
var MAX_GUESSES = 6;
var STARTING_WORD = "slate";
var API_BASE = 'http://127.0.0.1:7860';

// ── State ───────────────────────────────────────────────────────────────────
var currentMode = 'daily';
var currentGuess = '';
var currentGuessIndex = 0;
var isPlaying = false;
var stopRequested = false;
var autoPlayTimer = null;
var autoPlayDelay = 800;
var possibleWords = [];
var currentTargetWord = '';
var currentWordSize = 5;

// ── Solver ─────────────────────────────────────────────────────────────────
function badLetters(result, guess) {
  var bad = [];
  for (var i = 0; i < WORD_SIZE; i++) {
    if (result[i] === 'w') bad.push(guess[i]);
  }
  return bad;
}

function partialLetters(result, guess) {
  var partial = [];
  for (var i = 0; i < WORD_SIZE; i++) {
    if (result[i] === 'y') partial.push([guess[i], i]);
  }
  return partial;
}

function correctLetters(result, guess) {
  var correct = [];
  for (var i = 0; i < WORD_SIZE; i++) {
    if (result[i] === 'g') correct.push([guess[i], i]);
  }
  return correct;
}

function wordRemover(result, guess, words) {
  var bad = badLetters(result, guess);
  var correct = correctLetters(result, guess);
  var partial = partialLetters(result, guess);
  var goodLetters = correct.map(function(c) { return c[0]; })
    .concat(partial.map(function(p) { return p[0]; }));

  var acceptable = words.filter(function(w) {
    for (var b = 0; b < bad.length; b++) {
      if (w.indexOf(bad[b]) !== -1 && goodLetters.indexOf(bad[b]) === -1) return false;
    }
    return true;
  });

  acceptable = acceptable.filter(function(w) {
    for (var c = 0; c < correct.length; c++) {
      if (w[correct[c][1]] !== correct[c][0]) return false;
    }
    return true;
  });

  acceptable = acceptable.filter(function(w) {
    for (var p = 0; p < partial.length; p++) {
      if (w[partial[p][1]] === partial[p][0]) return false;
    }
    return true;
  });

  acceptable = acceptable.filter(function(w) {
    for (var g = 0; g < goodLetters.length; g++) {
      if (w.indexOf(goodLetters[g]) === -1) return false;
    }
    return true;
  });

  acceptable = acceptable.filter(function(w) {
    for (var b = 0; b < bad.length; b++) {
      if (goodLetters.indexOf(bad[b]) !== -1) {
        var count = goodLetters.filter(function(x) { return x === bad[b]; }).length;
        if (w.split('').filter(function(x) { return x === bad[b]; }).length !== count) return false;
      }
    }
    return true;
  });

  return acceptable;
}

function letterFreq(words) {
  var alphabet = 'abcdefghijklmnopqrstuvwxyz';
  var freq = {};
  for (var a = 0; a < alphabet.length; a++) {
    var c = alphabet[a];
    freq[c] = [0, 0, 0, 0, 0];
    for (var i = 0; i < WORD_SIZE; i++) {
      for (var w = 0; w < words.length; w++) {
        if (words[w][i] === c) freq[c][i]++;
      }
    }
  }
  return freq;
}

function wordScore(words, frequencies) {
  var maxFreq = [0, 0, 0, 0, 0];
  for (var c in frequencies) {
    for (var i = 0; i < WORD_SIZE; i++) {
      if (maxFreq[i] < frequencies[c][i]) maxFreq[i] = frequencies[c][i];
    }
  }

  var scored = {};
  for (var w = 0; w < words.length; w++) {
    var word = words[w];
    var score = 1;
    for (var i = 0; i < WORD_SIZE; i++) {
      score *= 1 + Math.pow(frequencies[word[i]][i] - maxFreq[i], 2);
    }
    score += Math.random();
    scored[word] = score;
  }
  return scored;
}

function bestWord(words, frequencies) {
  if (words.length === 0) return null;
  var scores = wordScore(words, frequencies);
  var minScore = Infinity;
  var best = words[0];
  for (var w = 0; w < words.length; w++) {
    var word = words[w];
    if (scores[word] < minScore) {
      minScore = scores[word];
      best = word;
    }
  }
  return best;
}

// ── Board Rendering ──────────────────────────────────────────────────────────
function initBoard() {
  var board = document.getElementById('board');
  board.innerHTML = '';
  for (var r = 0; r < MAX_GUESSES; r++) {
    var row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-' + r;
    for (var c = 0; c < 5; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'cell-' + r + '-' + c;
      row.appendChild(cell);
    }
    board.appendChild(row);
  }
}

function writeGuessToBoard(rowIdx, guess) {
  for (var c = 0; c < 5; c++) {
    var cell = document.getElementById('cell-' + rowIdx + '-' + c);
    if (cell) {
      cell.textContent = guess[c] || '';
      cell.classList.add('pop');
      setTimeout(function(el) { el.classList.remove('pop'); }, 150, cell);
    }
  }
}

function revealRow(rowIdx, result, onDone) {
  var delay = 300;
  var revealed = 0;
  for (var c = 0; c < 5; c++) {
    (function(col) {
      setTimeout(function() {
        var cell = document.getElementById('cell-' + rowIdx + '-' + col);
        if (!cell) return;
        cell.classList.add('flip');
        setTimeout(function() {
          cell.classList.add('reveal-' + result[col]);
          revealed++;
          if (revealed === 5 && onDone) onDone();
        }, 250);
      }, col * delay);
    })(c);
  }
}

// ── API ─────────────────────────────────────────────────────────────────────
async function apiGuess(mode, guess, seed, targetWord) {
  var url;
  if (mode === 'daily') {
    url = API_BASE + '/daily?guess=' + encodeURIComponent(guess) + '&size=' + WORD_SIZE;
  } else if (mode === 'random') {
    var rUrl = API_BASE + '/random?guess=' + encodeURIComponent(guess) + '&size=' + WORD_SIZE;
    if (seed) rUrl += '&seed=' + seed;
    url = rUrl;
  } else if (mode === 'specific') {
    url = API_BASE + '/word/' + encodeURIComponent(targetWord) + '?guess=' + encodeURIComponent(guess);
  }

  var resp = await fetch(url);
  if (!resp.ok) throw new Error('API error: ' + resp.status);
  return resp.json();
}

async function checkHealth() {
  try {
    var resp = await fetch(API_BASE + '/daily?guess=slate&size=5');
    return resp.ok;
  } catch (e) {
    return false;
  }
}

// ── Game Logic ───────────────────────────────────────────────────────────────
function updateProgress(guessCount) {
  document.getElementById('progressFill').style.width = ((guessCount / MAX_GUESSES) * 100) + '%';
  document.getElementById('guessCounter').textContent = guessCount + '/' + MAX_GUESSES;
}

function addLogEntry(guess, result, meta, type) {
  type = type || '';
  var list = document.getElementById('logList');
  var empty = list.querySelector('.log-empty');
  if (empty) empty.remove();

  var entry = document.createElement('div');
  entry.className = 'log-entry ' + type;

  var letters = guess.toUpperCase();
  var badges = '';
  for (var i = 0; i < result.length; i++) {
    badges += '<div class="log-badge ' + result[i] + '">' + letters[i] + '</div>';
  }

  entry.innerHTML =
    '<div class="log-guess">' + letters + '</div>' +
    '<div class="log-result">' + badges + '</div>' +
    (meta ? '<div class="log-meta">' + meta + '</div>' : '');

  list.appendChild(entry);
  list.scrollTop = list.scrollHeight;
}

function setMessage(text, type) {
  type = type || '';
  var el = document.getElementById('gameMessage');
  el.textContent = text;
  el.className = 'message ' + type;
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeDaily').className = 'mode-btn' + (mode === 'daily' ? ' active' : '');
  document.getElementById('modeRandom').className = 'mode-btn' + (mode === 'random' ? ' active' : '');
  document.getElementById('modeSpecific').className = 'mode-btn' + (mode === 'specific' ? ' active' : '');
  document.getElementById('seedRow').style.display = mode === 'random' ? 'flex' : 'none';
  document.getElementById('wordRow').style.display = mode === 'specific' ? 'flex' : 'none';
}

function updateSpeedLabel() {
  var v = document.getElementById('speedSlider').value;
  document.getElementById('speedVal').textContent = v + 'ms';
  autoPlayDelay = parseInt(v);
}

function setControlsUI(playing) {
  isPlaying = playing;
  document.getElementById('startBtn').style.display = playing ? 'none' : 'block';
  document.getElementById('stopBtn').style.display = playing ? 'block' : 'none';
}

async function startGame() {
  if (isPlaying) return;

  if (currentMode === 'specific') {
    var wordInput = document.getElementById('wordInput').value.trim().toLowerCase();
    if (!wordInput || wordInput.length !== 5) {
      setMessage('Please enter a 5-letter word', 'lose');
      return;
    }
    currentTargetWord = wordInput;
  }

  var healthy = await checkHealth();
  if (!healthy) {
    setMessage('Cannot connect to API. Is wordle_web.py running?', 'lose');
    return;
  }

  stopRequested = false;
  currentGuessIndex = 0;
  possibleWords = FULL_WORD_LIST.slice();
  currentGuess = STARTING_WORD;

  setControlsUI(true);
  setMessage('Solving...');
  updateProgress(0);
  var logList = document.getElementById('logList');
  logList.innerHTML = '<div class="log-empty">No guesses yet</div>';
  initBoard();

  autoPlayStep();
}

function stopGame() {
  stopRequested = true;
  if (autoPlayTimer) {
    clearTimeout(autoPlayTimer);
    autoPlayTimer = null;
  }
  setControlsUI(false);
  setMessage('Stopped');
}

function resetGame() {
  stopRequested = true;
  if (autoPlayTimer) {
    clearTimeout(autoPlayTimer);
    autoPlayTimer = null;
  }
  isPlaying = false;
  currentGuessIndex = 0;
  currentGuess = '';
  currentTargetWord = '';
  currentWordSize = 5;
  possibleWords = FULL_WORD_LIST.slice();

  setControlsUI(false);
  setMessage('Press Start to play');
  updateProgress(0);
  document.getElementById('logList').innerHTML = '<div class="log-empty">No guesses yet</div>';
  initBoard();
}

async function autoPlayStep() {
  if (stopRequested) return;

  var seed = null;
  if (currentMode === 'random') {
    var seedVal = parseInt(document.getElementById('seedInput').value);
    if (!isNaN(seedVal)) seed = seedVal;
  }

  // For specific mode, filter word list by word length
  if (currentMode === 'specific') {
    possibleWords = FULL_WORD_LIST.filter(function(w) { return w.length === currentWordSize; });
    if (possibleWords.length === 0) possibleWords = FULL_WORD_LIST.slice();
  }

  writeGuessToBoard(currentGuessIndex, currentGuess);

  try {
    var apiResult = await apiGuess(currentMode, currentGuess, seed, currentTargetWord);

    if (!Array.isArray(apiResult) || apiResult.length === 0) {
      throw new Error('Invalid API response');
    }

    var resultStr = '';
    for (var i = 0; i < apiResult.length; i++) {
      var item = apiResult[i];
      if (item.result === 'correct') resultStr += 'g';
      else if (item.result === 'present') resultStr += 'y';
      else resultStr += 'w';
    }

    await (function(resolve) { revealRow(currentGuessIndex, resultStr, resolve); })();

    if (stopRequested) return;

    addLogEntry(currentGuess, resultStr, possibleWords.length + ' words remaining', '');
    updateProgress(currentGuessIndex + 1);

    if (resultStr === 'ggggg') {
      setControlsUI(false);
      var wonMsg = 'Solved in ' + (currentGuessIndex + 1) + ' guess' + (currentGuessIndex === 0 ? '' : 'es') + '!';
      setMessage(wonMsg, 'win');
      addLogEntry('', '', wonMsg, 'win');
      return;
    }

    if (currentGuessIndex >= MAX_GUESSES - 1) {
      setControlsUI(false);
      setMessage('No more guesses. Failed!', 'lose');
      addLogEntry('', '', 'No more guesses — failed.', 'lose');
      return;
    }

    possibleWords = wordRemover(resultStr, currentGuess, possibleWords);

    if (possibleWords.length === 0) {
      setControlsUI(false);
      setMessage('No possible words left!', 'lose');
      return;
    }

    currentGuess = bestWord(possibleWords, letterFreq(possibleWords)) || STARTING_WORD;
    currentGuessIndex++;

    autoPlayTimer = setTimeout(autoPlayStep, autoPlayDelay);

  } catch (err) {
    setControlsUI(false);
    setMessage('Error: ' + err.message, 'lose');
  }
}

  initBoard();
  updateSpeedLabel();
  setMode('daily');
